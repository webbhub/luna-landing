<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Luna Iborra | VIP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-graphite: #18181b;
      --neon-pink: #ff2a7a;
      --neon-pink-light: #ff5c99;
      --text-white: #f8fafc;
      --text-gray: #a1a1aa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative Background Blurs */
    .blur-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 1;
      opacity: 0.35;
      pointer-events: none;
    }

    .blur-top {
      top: -5%;
      left: -10%;
      width: 300px;
      height: 300px;
      background: var(--neon-pink);
    }

    .blur-bottom {
      bottom: -5%;
      right: -10%;
      width: 300px;
      height: 300px;
      background: #4a1d96; /* Adds depth with a deep graphite/purple mix */
    }

    /* Main Centered Container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 430px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Profile Image */
    .profile-img {
      width: 260px;
      height: 350px;
      border-radius: 24px;
      object-fit: cover;
      background-color: var(--bg-graphite);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 24px rgba(255, 42, 122, 0.15);
      margin-bottom: 24px;
    }

    /* Typography */
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 2px;
      color: var(--text-white);
    }

    .instagram {
      font-size: 16px;
      font-weight: 500;
      color: var(--neon-pink);
      margin-bottom: 20px;
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .description {
      font-size: 14px;
      color: var(--text-gray);
      line-height: 1.5;
      margin-top: 24px;
      margin-bottom: 0;
      font-weight: 400;
    }

    /* Call to Action Button */
    .vip-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-pink-light));
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 100px;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 42, 122, 0.35);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .vip-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(255, 42, 122, 0.5);
    }

    .vip-button:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 4px 16px rgba(255, 42, 122, 0.3);
    }

    .button-text {
      position: relative;
      z-index: 2;
    }

    /* Click Animation (Ripple) */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: ripple-animation 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple-animation {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Decorative Blurs -->
  <div class="blur-circle blur-top"></div>
  <div class="blur-circle blur-bottom"></div>

  <!-- Centered Content -->
  <main class="container">
    <!-- Placeholder Image -->
    <img src="https://i.postimg.cc/t4S51LTm/7.png" alt="Luna Iborra" class="profile-img">
    
    <h1>Luna Iborra</h1>
    <a href="#" class="instagram">@luna.iborra</a>
    
    <!-- COLOCAR LINK DO GRUPO AQUI -->
    <a href="#" class="vip-button" id="vipBtn">
      <span class="button-text">✨ Entrar no VIP</span>
    </a>
    
    <p class="description">Conteúdo exclusivo atualizado diariamente.</p>
  </main>

  <script>
    // Leve animação de clique (efeito Ripple) para o botão
    const button = document.getElementById('vipBtn');
    
    button.addEventListener('click', function(e) {
      const rect = e.target.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      
      // Define a posição exata de onde ocorreu o clique
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      ripple.style.width = ripple.style.height = `${Math.max(rect.width, rect.height)}px`;
      
      this.appendChild(ripple);
      
      setTimeout(() => {
        ripple.remove();
      }, 600);
    });
  </script>
</body>
</html>
